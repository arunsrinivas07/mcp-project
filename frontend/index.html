<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Study Assistant</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <i data-lucide="sparkles" class="text-blue"></i>
                <span class="logo-text">MCP Learning Assistant</span>
            </div>

            <nav class="nav-group">
                <button class="nav-item active"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                <button class="nav-item"><i data-lucide="book-open"></i> Course Material</button>
                <button class="nav-item"><i data-lucide="history"></i> History</button>
                <button class="nav-item" id="logout-btn"><i data-lucide="log-out"></i> Logout</button>
            </nav>

            <div class="nav-group" style="margin-top: auto;">
                <input type="file" id="pdf-input" hidden accept=".pdf">
                <button class="btn btn-primary" id="upload-trigger"><i data-lucide="plus"></i> Process New PDF</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header-section">
                <p class="user-greeting">Welcome!</p>
                <h1 class="main-title">How can I help you study?</h1>
                <p class="sub-text">
                    I've indexed your current course materials. Ask me to summarize concepts, generate flashcards, or
                    create a mock test.
                </p>

                <div class="badges-container">
                    <span class="suggestion-badge" onclick="submitFast('Summarize my PDF')"><i data-lucide="align-left"
                            class="text-pink"></i> Summarize text</span>
                    <span class="suggestion-badge" onclick="submitFast('Generate a quiz')"><i data-lucide="help-circle"
                            class="text-orange"></i> Create Quiz</span>
                    <span class="suggestion-badge" onclick="submitFast('What are the key topics?')"><i
                            data-lucide="pen-tool" class="text-yellow"></i> Key Topics</span>
                </div>
            </div>

            <!-- Response Section -->
            <div id="response-container" class="response-container">
                <div class="response-label">Assistant Response</div>
                <div id="response-text" class="markdown-body"></div>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-area">
                    <textarea id="user-input" placeholder="Ask me anything about your documents..."></textarea>
                </div>

                <div class="bottom-controls">
                    <div class="action-buttons">
                        <button type="button" class="btn btn-primary" id="send-btn" onclick="handleAsk(event)"><i
                                data-lucide="send"></i> Send Msg</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Auth Guard ---
        const userId = localStorage.getItem('user_id');
        const username = localStorage.getItem('username');

        if (!userId) {
            window.location.href = 'auth.html';
        }

        document.querySelector('.user-greeting').innerText = `Welcome, ${username || 'Learner'}!`;

        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            window.location.href = 'auth.html';
        };

        // --- View Management ---
        const views = {
            dashboard: document.querySelector('.header-section'),
            input: document.querySelector('.input-section')
        };

        function resetMainContent() {
            // Only hide header for non-dashboard views
            views.dashboard.style.display = 'none';
        }

        async function loadDashboard() {
            location.reload(); // Quick reset to dashboard
        }

        async function loadMaterials() {
            resetMainContent();
            responseText.innerHTML = '<h2>Course Materials</h2><div id="material-list">Loading...</div>';
            responseContainer.style.display = 'block';

            const resp = await fetch(`http://127.0.0.1:5000/api/materials/${userId}`);
            const data = await resp.json();

            let html = '<div style="display:grid; gap:16px; margin-top:20px;">';
            data.forEach(doc => {
                html += `<div class="suggestion-badge" style="justify-content:space-between; width:100%; cursor:default;">
                    <span><i data-lucide="file-text"></i> ${doc.filename}</span>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span style="font-size:0.7rem; color:var(--text-muted)">${new Date(doc.date).toLocaleDateString()}</span>
                        <a href="http://127.0.0.1:5000/api/view/${doc.id}" target="_blank" class="btn btn-primary" style="padding:4px 12px; font-size:0.7rem;">View</a>
                    </div>
                </div>`;
            });
            html += '</div>';
            document.getElementById('material-list').innerHTML = data.length ? html : '<p>No PDFs uploaded yet.</p>';
            lucide.createIcons();
        }

        async function loadQuizzes() {
            resetMainContent();
            responseText.innerHTML = '<h2>Interactive Quizzes</h2><div id="quiz-list-container">Loading...</div>';
            responseContainer.style.display = 'block';

            const resp = await fetch(`http://127.0.0.1:5000/api/quizzes/${userId}`);
            const data = await resp.json();

            let html = '<div style="display:grid; gap:20px; margin-top:20px;">';
            data.forEach((q, idx) => {
                html += `<div class="quiz-card" style="padding:24px; background:var(--card-bg); border:1px solid var(--border); border-radius:20px;">
                    <div style="font-weight:700; margin-bottom:16px;">Q${idx+1}: ${q.question}</div>
                    <div style="display:grid; gap:10px;">
                        ${q.options.map((opt, i) => {
                            const letter = String.fromCharCode(65 + i);
                            return `<button class="btn btn-secondary quiz-opt" onclick="checkAnswer(this, '${letter}', '${q.correct}')" style="text-align:left; justify-content:flex-start;">
                                <span style="font-weight:800; margin-right:12px;">${letter}</span> ${opt}
                            </button>`;
                        }).join('')}
                    </div>
                </div>`;
            });
            html += '</div>';
            document.getElementById('quiz-list-container').innerHTML = data.length ? html : '<p>No quizzes generated yet. Go to Course Material to start one!</p>';
        }

        window.checkAnswer = (btn, selected, correct) => {
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.style.pointerEvents = 'none');
            
            if (selected === correct) {
                btn.style.background = 'var(--mint)';
                btn.style.color = '#000';
            } else {
                btn.style.background = 'var(--pink)';
                btn.style.color = '#fff';
                // Show correct one
                parent.querySelectorAll('button').forEach(b => {
                    if (b.innerText.includes(correct + ' ')) b.style.border = '2px solid var(--mint)';
                });
            }
        };

        async function createQuiz(docId) {
            const resp = await fetch(`http://127.0.0.1:5000/api/generate-quiz/${docId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            alert("Generating Quiz... It will appear in the Quizzes tab shortly!");
        }

        async function loadHistory() {
            resetMainContent();
            responseText.innerHTML = '<h2>Study History</h2><div id="history-list">Loading...</div>';
            responseContainer.style.display = 'block';

            const resp = await fetch(`http://127.0.0.1:5000/api/history/${userId}`);
            const data = await resp.json();

            let html = '<div style="display:flex; flex-direction:column; gap:20px; margin-top:20px;">';
            data.forEach(item => {
                html += `<div style="padding:20px; background:#252525; border-radius:16px; border-left:4px solid var(--cyan);">
                    <div style="font-weight:700; margin-bottom:8px; color:var(--cyan);">Q: ${item.query}</div>
                    <div style="font-size:0.9rem; color:var(--text-muted);">${marked.parse(item.response)}</div>
                    <div style="font-size:0.7rem; margin-top:10px;">${new Date(item.date).toLocaleString()}</div>
                </div>`;
            });
            html += '</div>';
            document.getElementById('history-list').innerHTML = data.length ? html : '<p>Chat history is empty.</p>';
            lucide.createIcons();
        }

        // Attach listeners to Sidebar
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                const text = btn.innerText.trim();

                // 🔥 Special check for Logout
                if (text.includes('Logout')) {
                    localStorage.clear();
                    window.location.href = 'auth.html';
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (text.includes('Dashboard')) window.location.reload();
                if (text.includes('Course Material')) loadMaterials();
                if (text.includes('History')) loadHistory();
            };
        });

        // ------------------

        lucide.createIcons();

        const pdfInput = document.getElementById('pdf-input');
        const uploadTrigger = document.getElementById('upload-trigger');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const responseContainer = document.getElementById('response-container');
        const responseText = document.getElementById('response-text');

        function submitFast(text) {
            userInput.value = text;
            handleAsk();
        }

        uploadTrigger.addEventListener('click', () => pdfInput.click());

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('user_id', userId);

            uploadTrigger.innerText = 'Processing...';

            try {
                const resp = await fetch('http://127.0.0.1:5000/upload', { method: 'POST', body: formData });
                const data = await resp.json();
                if (!resp.ok) {
                    alert('Upload failed: ' + (data.error || 'Unknown error'));
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error('Upload error:', err);
                alert('Upload failed. Is the Flask server running?');
            } finally {
                uploadTrigger.innerHTML = '<i data-lucide="plus"></i> Process New PDF';
                lucide.createIcons();
            }
        });

        async function handleAsk(e) {
            if (e) e.preventDefault();
            const query = userInput.value.trim();
            if (!query) return;

            const isMore = query.toLowerCase().includes('more');

            sendBtn.disabled = true;
            sendBtn.innerText = 'Thinking...';

            responseContainer.style.display = 'block';

            // 🚀 If it's a "More" request, DON'T clear the screen. Just add an indicator.
            if (isMore) {
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'quiz-loading';
                loadingDiv.innerHTML = '<p style="color:var(--sunset-blue)"><i>Generating more questions...</i></p>';
                responseText.appendChild(loadingDiv);
            } else {
                responseText.innerHTML = '<p style="color:var(--text-muted)"><i>Thinking...</i></p>';
            }

            try {
                const resp = await fetch('http://127.0.0.1:5000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, user_id: userId })
                });
                const data = await resp.json();

                // Remove loading indicator if it exists
                const loader = document.getElementById('quiz-loading');
                if (loader) loader.remove();

                if (isMore) {
                    responseText.innerHTML += '<hr style="border:1px solid var(--border); margin:20px 0;">' + marked.parse(data.response);
                } else {
                    responseText.innerHTML = marked.parse(data.response);
                }

                // --- Add 'More' button for Quizzes ---
                if (query.toLowerCase().includes('quiz') || query.toLowerCase().includes('mcq')) {
                    // Remove old buttons first
                    document.querySelectorAll('.btn-more-questions').forEach(b => b.remove());

                    const moreBtn = document.createElement('button');
                    moreBtn.type = 'button';
                    moreBtn.className = 'btn btn-secondary btn-more-questions';
                    moreBtn.style.marginTop = '20px';
                    moreBtn.innerHTML = '<i data-lucide="plus"></i> Generate More Questions';
                    moreBtn.onclick = () => submitFast('Generate 5 more MCQs');
                    responseText.appendChild(moreBtn);
                    lucide.createIcons();
                }

                responseContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (err) {
                console.error('Ask error:', err);
                alert('Error connecting to backend at http://127.0.0.1:5000');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i data-lucide="send"></i> Send Msg';
                lucide.createIcons();
            }
        }

        // Define on windows to ensure onclick="handleAsk(event)" works
        window.handleAsk = handleAsk;
    </script>
</body>

</html>
