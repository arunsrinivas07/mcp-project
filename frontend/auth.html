<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Assistant - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle glow effect behind the auth card */
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            /* background: var(--gradient-sunset); */
        }

        .auth-logo {
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--sunset-blue);
            box-shadow: 0 0 0 3px rgba(96, 181, 255, 0.15);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .auth-btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            font-size: 1rem;
            border-radius: 12px;
        }

        .toggle-text {
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toggle-link {
            color: var(--sunset-mint);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .toggle-link:hover {
            color: var(--sunset-blue);
        }

        .error-message {
            color: var(--sunset-red);
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
            background: rgba(243, 82, 82, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(243, 82, 82, 0.2);
        }
    </style>
</head>

<body>
    <div class="auth-container">


        <h2 id="auth-title" class="main-title" style="font-size: 1.5rem; margin-bottom: 8px;">Welcome Back!</h2>
        <p id="auth-subtitle" class="sub-text" style="margin-bottom: 32px;">Please enter your details</p>

        <form id="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary auth-btn">Login</button>
            <div id="error-box" class="error-message"></div>
        </form>

        <div class="toggle-text">
            <span id="toggle-msg">Don't have an account?</span>
            <span id="toggle-btn" class="toggle-link">Sign Up</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const toggleMsg = document.getElementById('toggle-msg');
        const errorBox = document.getElementById('error-box');

        let isLogin = true;

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? 'Welcome Back' : 'Create Account';
            subtitle.innerText = isLogin ? 'Please enter your details' : 'Join our learning community';
            submitBtn.innerText = isLogin ? 'Login' : 'Sign Up';
            toggleMsg.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleBtn.innerText = isLogin ? 'Sign Up' : 'Login';
            errorBox.style.display = 'none';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const endpoint = isLogin ? 'http://127.0.0.1:5000/login' : 'http://127.0.0.1:5000/signup';

            try {
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await resp.json();

                if (resp.ok) {
                    if (isLogin) {
                        localStorage.setItem('user_id', data.user_id);
                        localStorage.setItem('username', data.username);
                        window.location.href = 'index.html';
                    } else {
                        alert('Account created! Please login.');
                        isLogin = false; // toggle back to login
                        toggleBtn.click();
                    }
                } else {
                    errorBox.innerText = data.error;
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = 'Server connection failed';
                errorBox.style.display = 'block';
            }
        };
    </script>
</body>

</html>
